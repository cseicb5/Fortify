<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Viewer</title>
    <!-- Import JetBrains Mono from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    
    <style>
        /* 
           Material Theme Darker Palette Extracted:
           Background: #212121
           Foreground: #EEFFFF
           Comments/Guides: #424242
           Keywords/Purple: #C792EA
           Strings/Green: #C3E88D
           Functions/Blue: #82AAFF
           Variables/Red: #FF5370
           Classes/Yellow: #FFCB6B
           Cyan: #89DDFF
        */

        :root {
            --bg-primary: #212121;
            --bg-secondary: #292929; /* Slightly lighter for headers/alternating rows */
            --border-color: #424242;
            --text-primary: #EEFFFF;
            --text-secondary: #B2CCD6;
            --accent-purple: #C792EA;
            --accent-blue: #82AAFF;
            --accent-green: #C3E88D;
            --accent-red: #FF5370;
            --accent-yellow: #FFCB6B;
            --accent-cyan: #89DDFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: var(--bg-primary); 
            color: var(--text-primary); 
            line-height: 1.5; 
            font-size: 0.9rem;
        }

        .header { 
            background-color: var(--bg-primary); 
            border-bottom: 1px solid var(--border-color); 
            padding: 1rem 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .header h1 { 
            color: var(--accent-purple); /* Keyword Color */
            font-size: 1.5rem; 
            font-weight: 700; 
            letter-spacing: -0.5px;
        }

        .nav-link { 
            color: var(--accent-blue); 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 0.9rem; 
            transition: all 0.2s ease; 
            border-bottom: 1px solid transparent;
        }
        
        .nav-link:hover { 
            color: var(--accent-cyan); 
            border-bottom: 1px solid var(--accent-cyan);
        }

        .container { padding: 2rem; }

        .controls { margin-bottom: 1.5rem; display: flex; gap: 1rem; align-items: center; }

        .btn { 
            background-color: var(--accent-blue); 
            color: var(--bg-primary); /* Dark text on bright button for contrast */
            border: none; 
            padding: 0.6rem 1.2rem; 
            border-radius: 2px; /* Squared corners like Material theme */
            font-weight: 700; 
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover { 
            background-color: var(--accent-cyan); 
            box-shadow: 0 0 8px rgba(137, 221, 255, 0.4);
        }

        .table-container { 
            overflow-x: auto; 
            border: 1px solid var(--border-color); 
            border-radius: 4px; 
            background-color: var(--bg-primary);
        }

        table { width: 100%; border-collapse: collapse; }

        th, td { 
            padding: 1rem 1rem; 
            text-align: left; 
            border-bottom: 1px solid var(--border-color); 
            white-space: nowrap; 
        }

        th { 
            background-color: var(--bg-secondary); 
            font-weight: 700; 
            color: var(--accent-yellow); /* Class color */
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        tbody tr:last-child td { border-bottom: none; }
        
        /* Alternating rows with very subtle difference */
        tbody tr:nth-child(even) { background-color: #262626; }
        
        tbody tr:hover { background-color: #2f2f2f; }

        td { 
            font-size: 0.85rem; 
            color: var(--text-primary);
        }

        /* Specific Column Coloring based on theme logic */
        td:first-child { color: var(--accent-red); } /* Job ID - Red/Variable color */

        .status-pending { 
            color: var(--accent-yellow); 
            font-style: italic;
        }
        
        .status-done { 
            color: var(--accent-green); 
            font-weight: 600;
        }

        .loader { text-align: center; padding: 2rem; color: var(--text-secondary); }

        /* Custom scrollbar to match Material Theme Darker */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { 
            background: var(--border-color); 
            border: 2px solid var(--bg-primary);
            border-radius: 10px; 
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
        
        /* Code/Path styling */
        .path-text { color: var(--accent-cyan); }
        .token-text { color: var(--text-secondary); opacity: 0.7; }

    </style>
</head>
<body>
    <div class="header">
        <h1>Database Job Viewer</h1>
        <a href="/" class="nav-link">&lt; ~/Back to Scanner &gt;</a>
    </div>

    <div class="container">
        <div class="controls">
            <button class="btn" onclick="fetchDatabaseData()">Refresh Data</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Job ID</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th>Detection</th>
                        <th>Input File Path</th>
                        <th>Output File Path</th>
                        <th>JWT Token (Partial)</th>
                    </tr>
                </thead>
                <tbody id="db-table-body">
                    <!-- Data will be populated here by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const tableBody = document.getElementById('db-table-body');

        function renderTable(data) {
            tableBody.innerHTML = ''; // Clear existing data

            if (data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #B2CCD6;">// No jobs found in the database</td></tr>';
                return;
            }

            data.forEach(job => {
                const row = document.createElement('tr');
                const statusClass = job.STATUS === 'Pending' ? 'status-pending' : 'status-done';
                
                // Applying specific classes for syntax highlighting look
                row.innerHTML = `
                    <td>${job.JOB_ID}</td>
                    <td style="color: #82AAFF;">${job.TYPE || 'N/A'}</td>
                    <td class="${statusClass}">${job.STATUS || 'N/A'}</td>
                    <td style="color: #EEFFFF;">${job.DETECTION || 'N/A'}</td>
                    <td class="path-text">${job.INPUT_FILE_PATH || 'N/A'}</td>
                    <td class="path-text">${job.OUTPUT_FILE_PATH || 'N/A'}</td>
                    <td class="token-text">${job.JWT_TOKEN ? job.JWT_TOKEN.substring(0, 15) + '...' : 'N/A'}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        async function fetchDatabaseData() {
            tableBody.innerHTML = '<tr><td colspan="7" class="loader">Loading database records...</td></tr>';
            try {
                const response = await fetch('/get_db_data');
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                const data = await response.json();
                renderTable(data);
            } catch (error) {
                console.error("Failed to fetch database data:", error);
                tableBody.innerHTML = `<tr><td colspan="7" class="loader" style="color: #FF5370;">Error: Could not load data. Is the backend running?</td></tr>`;
            }
        }

        // Fetch data on initial page load
        document.addEventListener('DOMContentLoaded', fetchDatabaseData);
    </script>
</body>
</html>
