<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied | Zero Trust</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #171717;
      --bg-secondary: #1f1f1f;
      --border-primary: #3a3a3a;
      --text-primary: #ffffff;
      --text-secondary: #b3b3b3;
      --accent-blue: #3b82f6;
      --accent-blue-hover: #2563eb;
      --accent-orange: #f97316;
      --font-sans: 'Inter Variable', 'Inter', ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
      --font-mono: 'Paper Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .container {
      max-width: 520px;
      width: 100%;
    }

    /* Logo */
    .logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-orange);
    }

    .logo svg {
      width: 100%;
      height: 100%;
    }

    /* Main Content */
    .main-content {
      margin-bottom: 32px;
    }

    .error-code {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      font-family: var(--font-mono);
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .description {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    /* Action Button */
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.15s ease;
      font-family: var(--font-sans);
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: var(--accent-blue);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-blue-hover);
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-primary);
    }

    .btn-secondary:hover {
      background: #252525;
      border-color: #454545;
    }

    /* Blocked URL Info */
    .blocked-info {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid var(--border-primary);
    }

    .blocked-url {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-secondary);
      word-break: break-all;
      padding: 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: 6px;
      margin-top: 12px;
    }

    /* Responsive */
    @media (max-width: 640px) {
      h1 {
        font-size: 24px;
      }

      .description {
        font-size: 14px;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5z" fill="currentColor"/>
        <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="main-content">
      <div class="error-code">Access Denied</div>
      <h1>This site has been blocked</h1>
      <p class="description">
        This website has been blocked by your Zero Trust policy. 
        The site may pose a security risk or has been added to your blocklist.
      </p>

      <div class="actions">
        <button class="btn btn-primary" onclick="window.history.back()">Go Back</button>
        <button class="btn btn-secondary" onclick="window.location.href='chrome://newtab/'">New Tab</button>
      </div>
    </div>

    <div class="blocked-info">
      <div style="font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">
        Blocked URL
      </div>
      <div class="blocked-url" id="blocked-url">Loading...</div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlElement = document.getElementById('blocked-url');
      const hash = window.location.hash;
      
      if (hash) {
        urlElement.textContent = decodeURIComponent(hash.substring(1));
      } else {
        urlElement.textContent = 'Unknown';
      }
    });
  </script>
</body>
</html>
