<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zero Trust Security</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #171717;
      --bg-secondary: #1f1f1f;
      --bg-tertiary: #2a2a2a;
      --bg-hover: #2f2f2f;
      --border-primary: #3a3a3a;
      --border-secondary: #454545;
      --text-primary: #ffffff;
      --text-secondary: #b3b3b3;
      --text-tertiary: #808080;
      --accent-blue: #3b82f6;
      --accent-blue-hover: #2563eb;
      --accent-orange: #f97316;
      --accent-green: #00ff9c;
      --accent-red: #ff4444;
      --accent-yellow: #ffd60a;
      --font-sans: 'Inter Variable', 'Inter', ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
      --font-mono: 'Paper Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
    }

    body {
      /* Reduced width from 420px to 350px */
      width: 350px;
      /* Reduced min-height from 500px to 400px */
      min-height: 400px;
      max-height: 600px;
      font-family: var(--font-sans);
      font-size: 13px; /* Slightly smaller base font */
      background: var(--bg-primary);
      color: var(--text-primary);
      margin: 0;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* Header */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-primary);
      padding: 12px 16px; /* Reduced padding */
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 20px; /* Smaller logo */
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-orange);
    }

    .logo svg {
      width: 100%;
      height: 100%;
    }

    .header-title {
      font-size: 14px; /* Adjusted size */
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }

    /* Main Content */
    .content {
      flex: 1;
      padding: 16px; /* Reduced padding from 20px */
      display: flex;
      flex-direction: column;
      gap: 12px; /* Reduced gap */
      overflow-y: auto;
    }

    .content::-webkit-scrollbar {
      width: 6px;
    }

    .content::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    .content::-webkit-scrollbar-thumb {
      background: var(--border-primary);
      border-radius: 3px;
    }

    /* Rating Section */
    #rating-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: 8px;
      padding: 16px; /* Reduced padding */
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .rating-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #rating-grade {
      font-size: 42px; /* Reduced from 56px */
      font-weight: 700;
      font-family: var(--font-mono);
      line-height: 1;
      color: var(--text-primary);
      transition: color 0.2s ease;
    }

    .rating-info {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #rating-summary {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    #rating-score {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      font-family: var(--font-mono);
    }

    /* Threat Stats */
    #threat-stats {
      display: flex;
      gap: 8px; /* Tighter gap */
      padding-top: 12px;
      border-top: 1px solid var(--border-primary);
    }

    .stat-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .stat-badge {
      width: 28px; /* Smaller badges */
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--text-primary);
    }

    .stat-badge.bad {
      background: var(--bg-tertiary);
      border: 1px solid var(--accent-red);
      color: var(--accent-red);
    }

    .stat-badge.caution {
      background: var(--bg-tertiary);
      border: 1px solid var(--accent-yellow);
      color: var(--accent-yellow);
    }

    .stat-badge.good {
      background: var(--bg-tertiary);
      border: 1px solid var(--accent-green);
      color: var(--accent-green);
    }

    .stat-label {
      font-size: 9px;
      font-weight: 500;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Current Site Section */
    .current-site-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: 8px;
      padding: 12px 16px;
    }

    .current-site-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 8px;
    }

    .site-url {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-primary);
      word-break: break-all;
      flex: 1;
    }

    .btn-add {
      background: var(--accent-blue);
      color: white;
      border: none;
      padding: 6px 12px; /* Smaller button */
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
      font-family: var(--font-sans);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-add:hover {
      background: var(--accent-blue-hover);
    }

    .btn-add:disabled {
      background: var(--bg-tertiary);
      color: var(--text-tertiary);
      cursor: not-allowed;
    }

    /* Loading Indicator */
    #loading-indicator {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      gap: 10px;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border-primary);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* Analysis Section */
    .analysis-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
    }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-tertiary);
      padding: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-title::before {
      content: '';
      width: 2px;
      height: 10px;
      background: var(--accent-blue);
      border-radius: 1px;
    }

    #details-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: 250px;
      overflow-y: auto;
    }

    #details-list::-webkit-scrollbar {
      width: 4px;
    }

    #details-list::-webkit-scrollbar-track {
      background: var(--bg-secondary);
      border-radius: 2px;
    }

    #details-list::-webkit-scrollbar-thumb {
      background: var(--border-primary);
      border-radius: 2px;
    }

    #details-list::-webkit-scrollbar-thumb:hover {
      background: var(--border-secondary);
    }

    .category-header {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-tertiary);
      padding: 8px 0 4px;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border-primary);
      position: sticky;
      top: 0;
      background: var(--bg-secondary);
      z-index: 5;
    }

    .category-header:first-child {
      margin-top: 0;
    }

    #details-list li {
      padding: 8px 10px;
      border-radius: 6px;
      margin: 1px 0;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      background: var(--bg-tertiary);
      border: 1px solid transparent;
      transition: background 0.15s ease;
      font-size: 11px;
    }

    #details-list li:hover {
      background: var(--bg-hover);
      border-color: var(--border-primary);
    }

    .result-icon {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .result-icon svg {
      width: 100%;
      height: 100%;
    }

    .result-text {
      flex: 1;
      line-height: 1.4;
      font-weight: 500;
    }

    /* Text Colors */
    .good {
      color: var(--accent-green);
      border-left: 2px solid var(--accent-green);
    }

    .bad {
      color: var(--accent-red);
      border-left: 2px solid var(--accent-red);
      background: rgba(255, 68, 68, 0.1) !important;
    }

    .bad:hover {
      background: rgba(255, 68, 68, 0.15) !important;
    }

    .caution {
      color: var(--accent-yellow);
      border-left: 2px solid var(--accent-yellow);
    }

    .neutral {
      color: var(--text-primary);
      border-left: 2px solid var(--border-primary);
    }

    /* Success Message */
    .success-message {
      background: var(--bg-tertiary);
      border: 1px solid var(--accent-blue);
      border-radius: 6px;
      padding: 10px;
      font-size: 12px;
      color: var(--text-primary);
      text-align: center;
      display: none;
    }

    .success-message.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5z" fill="currentColor"/>
          <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="header-title">Zero Trust</span>
    </div>
    
    <div class="content">
      <div class="success-message" id="success-message">
        Site added to blocklist
      </div>

      <div id="rating-section">
        <div class="rating-main">
          <div id="rating-grade">...</div>
          <div class="rating-info">
            <div id="rating-summary">Analyzing...</div>
            <div id="rating-score">--/100</div>
          </div>
        </div>
        
        <div id="threat-stats">
          <div class="stat-item">
            <span class="stat-badge bad">0</span>
            <span class="stat-label">Critical</span>
          </div>
          <div class="stat-item">
            <span class="stat-badge caution">0</span>
            <span class="stat-label">Warnings</span>
          </div>
          <div class="stat-item">
            <span class="stat-badge good">0</span>
            <span class="stat-label">Secure</span>
          </div>
        </div>
      </div>

      <div class="current-site-section">
        <div class="current-site-info">
          <div class="site-url" id="current-site-url">Loading...</div>
          <button class="btn-add" id="btn-add-site">Add to Blocklist</button>
        </div>
      </div>

      <div id="loading-indicator">
        <div class="loading-spinner"></div>
        <div class="loading-text">Scanning URL...</div>
      </div>
      
      <div class="analysis-section">
        <div class="section-title">Analysis Report</div>
        <ul id="details-list">
          <li class="neutral">
            <span class="result-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="result-text">Initializing security scan...</span>
          </li>
        </ul>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
